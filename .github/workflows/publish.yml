# Publishes window_to_front to pub.dev when a version tag is pushed.
#
# One-time setup required on pub.dev (package owner only):
#   pub.dev > window_to_front > Admin > Automated publishing >
#   Enable "Publishing from GitHub Actions"
#     Repository:  sumitvekariya/window_to_front
#     Tag pattern: v{{version}}
#
# To release after that: bump the version in pubspec.yaml + CHANGELOG.md,
# merge to master, then push a matching tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Docs: https://dart.dev/tools/pub/automated-publishing
name: Publish to pub.dev

on:
  push:
    tags:
      # Must align with the tag-pattern configured on pub.dev.
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication to pub.dev.
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
